<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Bezier SV mode curve comparison</title>
  <desc id="desc">Representative normalized curves for Linear, Bezier In-Out, and Bezier Out-In.</desc>
  <rect width="900" height="560" fill="#21171c"/>
  <rect x="52" y="40" width="796" height="460" rx="8" fill="#2e1f25" stroke="#5a3a47"/>
  <g stroke="#5a3a47" stroke-width="1">
    <line x1="130" y1="410" x2="780" y2="410"/>
    <line x1="130" y1="90" x2="130" y2="410"/>
    <line x1="130" y1="346" x2="780" y2="346" opacity=".45"/>
    <line x1="130" y1="282" x2="780" y2="282" opacity=".45"/>
    <line x1="130" y1="218" x2="780" y2="218" opacity=".45"/>
    <line x1="130" y1="154" x2="780" y2="154" opacity=".45"/>
    <line x1="260" y1="90" x2="260" y2="410" opacity=".35"/>
    <line x1="390" y1="90" x2="390" y2="410" opacity=".35"/>
    <line x1="520" y1="90" x2="520" y2="410" opacity=".35"/>
    <line x1="650" y1="90" x2="650" y2="410" opacity=".35"/>
  </g>
  <g fill="#f4dce8" font-family="Arial, sans-serif" font-size="18">
    <text x="122" y="442">0</text>
    <text x="764" y="442">1</text>
    <text x="96" y="416">0</text>
    <text x="96" y="96">1</text>
    <text x="449" y="474" text-anchor="middle">t</text>
    <text x="70" y="250" text-anchor="middle" transform="rotate(-90 70 250)">normalized value</text>
  </g>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="5">
    <path d="M130 410 L780 90" stroke="#ffffff" opacity=".7"/>
    <path d="M130 410 L163 404 L195 394 L228 382 L260 368 L293 351 L325 333 L358 313 L390 293 L423 272 L455 250 L488 228 L520 207 L553 187 L585 167 L618 149 L650 132 L683 118 L715 106 L748 96 L780 90" stroke="#ff8fd4"/>
    <path d="M130 410 L163 371 L195 339 L228 313 L260 294 L293 279 L325 268 L358 261 L390 256 L423 253 L455 250 L488 247 L520 244 L553 239 L585 232 L618 221 L650 206 L683 187 L715 161 L748 129 L780 90" stroke="#b6ff6a"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="16">
    <g transform="translate(200 24)">
      <rect x="0" y="0" width="16" height="5" fill="#ffffff" opacity=".7"/>
      <text x="24" y="8" fill="#d9a6bd">Linear</text>
    </g>
    <g transform="translate(350 24)">
      <rect x="0" y="0" width="16" height="5" fill="#ff8fd4"/>
      <text x="24" y="8" fill="#d9a6bd">Bezier In-Out</text>
    </g>
    <g transform="translate(560 24)">
      <rect x="0" y="0" width="16" height="5" fill="#b6ff6a"/>
      <text x="24" y="8" fill="#d9a6bd">Bezier Out-In</text>
    </g>
  </g>
</svg>
