<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
		<meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'">
		<link rel="stylesheet" href="./css/boxicons.min.css">
		<link rel="stylesheet" href="./css/style.css">
		<title>osu!taiko SV Helper plus</title>
	</head>
	<body>
		<div class="wrap mode-basic">
			<div class="titlebar">
				<div class="titlebar-text">osu!taiko SV Helper plus</div>
				<select class="titlebar-language" tabindex="-1" aria-label="Language">
					<option value="en">EN</option>
					<option value="ja">JP</option>
				</select>
				<button type="button" class="titlebar-manual" tabindex="-1" data-i18n="manual">Manual</button>
				<div class="titlebar-close"><i class='bx bx-x'></i></div>
			</div>
			<div class="content">
				<div class="field">
					<label for="beatmap" data-i18n="beatmap">Beatmap</label>
					<div class="file">
						<div class="file-icon"><i class="bx bx-file-blank"></i></div>
						<span class="file-label"><span class="file-label-placeholder" data-i18n="filePlaceholder">Drag &amp; drop beatmap file here (*.osu)</span></span>
						<button type="button" class="file-select" tabindex="-1" data-i18n="selectFile">Select</button>
					</div>
				</div>
				<div class="field mode-item-advanced">
					<div class="field-heading">
						<label data-i18n="profile">Profile</label>
						<span data-i18n="profileNote">Save and reuse settings.</span>
					</div>
					<div class="profile">
						<input type="text" placeholder="Profile Name" data-i18n-placeholder="profileName">
						<select size="5"></select>
						<div class="profile-btn-group">
							<button type="button" class="profile-btn profile-btn-save" data-i18n="save">Save</button>
							<button type="button" class="profile-btn profile-btn-load" data-i18n="load">Load</button>
							<button type="button" class="profile-btn profile-btn-delete" data-i18n="delete">Delete</button>
						</div>
					</div>
				</div>
				<div class="field-group field-group-keep">
					<div class="field">
						<label for="sp_time" data-i18n="startPoint">Start Point</label>
						<input type="text" id="sp_time" placeholder="Time (00:12:345 - ...)" data-i18n-placeholder="timePlaceholder" tabindex="1">
						<input type="text" id="sp_velocity" placeholder="Slider Velocity (1.0...)" data-i18n-placeholder="velocityPlaceholder" tabindex="3">
						<input type="text" id="sp_volume" placeholder="Volume (5 ~ 100)" data-i18n-placeholder="volumePlaceholder" tabindex="5">
						<div class="checkbox">
							<input type="checkbox" id="sp_include" checked>
							<label for="sp_include" data-i18n="includeStart">Include Start Time</label>
						</div>
					</div>
					<div class="swap">
						<button class="swap-btn swap-time" tabindex="-1"><img src="./img/swap.svg" alt="Swap"></button>
						<button class="swap-btn swap-velocity" tabindex="-1"><img src="./img/swap.svg" alt="Swap"></button>
						<button class="swap-btn swap-volume" tabindex="-1"><img src="./img/swap.svg" alt="Swap"></button>
					</div>
					<div class="field">
						<label for="sp_time" data-i18n="endPoint">End Point</label>
						<input type="text" id="ep_time" placeholder="Time (00:12:345 - ...)" data-i18n-placeholder="timePlaceholder" tabindex="2">
						<div class="input-option-row">
							<input type="text" id="ep_velocity" placeholder="Slider Velocity (1.0...)" data-i18n-placeholder="velocityPlaceholder" tabindex="4">
							<div class="checkbox checkbox-mini input-option-check">
								<input type="checkbox" id="op_ignr_velocity">
								<label for="op_ignr_velocity" data-i18n="keep">Keep</label>
							</div>
						</div>
						<div class="input-option-row">
							<input type="text" id="ep_volume" placeholder="Volume (5 ~ 100)" data-i18n-placeholder="volumePlaceholder" tabindex="6">
							<div class="checkbox checkbox-mini input-option-check">
								<input type="checkbox" id="op_ignr_volume">
								<label for="op_ignr_volume" data-i18n="keep">Keep</label>
							</div>
						</div>
						<div class="checkbox">
							<input type="checkbox" id="ep_include" checked>
							<label for="ep_include" data-i18n="includeEnd">Include End Time</label>
						</div>
					</div>
				</div>
				<div class="field">
					<label data-i18n="options">Options</label>
					<div class="checkbox-group">
						<div class="checkbox">
							<input type="checkbox" id="op_dense">
							<label for="op_dense" data-i18n="denseMode">Dense Mode</label>
							<select id="op_dense_snap">
								<option value="16" selected>1/16 snap</option>
								<option value="8">1/8 snap</option>
								<option value="4">1/4 snap</option>
							</select>
						</div>
						<div class="checkbox">
							<input type="checkbox" id="op_offset">
							<label for="op_offset" data-i18n="offsetMode">-1/16 Offset Mode</label>
						</div>
					</div>
					<div class="checkbox-group option-mode-row">
						<div class="option-select">
							<label for="op_sv_mode" data-i18n="svMode">SV Mode</label>
							<select id="op_sv_mode">
								<option value="linear" selected data-i18n="svLinear">Linear</option>
								<option value="ratio" data-i18n="svRatio">Ratio</option>
								<option value="cubicIn" data-i18n="svCubicIn">Cubic In / Accelerate Curve</option>
								<option value="cubicOut" data-i18n="svCubicOut">Cubic Out / Decelerate Curve</option>
								<option value="sineIn" data-i18n="svSineIn">Sine In / Accelerate Curve</option>
								<option value="sineOut" data-i18n="svSineOut">Sine Out / Decelerate Curve</option>
								<option value="bezierInOut" data-i18n="svBezierInOut">Bezier In-Out</option>
								<option value="bezierOutIn" data-i18n="svBezierOutIn">Bezier Out-In</option>
							</select>
						</div>
						<div class="checkbox option-backup">
							<input type="checkbox" id="op_backup" checked>
							<label for="op_backup" data-i18n="backup">Backup</label>
						</div>
					</div>
				</div>
				<div class="btn-group">
					<button type="button" class="btn btn-overwrite" tabindex="-1" data-i18n="overwrite">Overwrite</button>
					<button type="button" class="btn btn-modify" tabindex="-1" data-i18n="modify">Modify</button>
				</div>
				<div class="btn-group">
					<button type="button" class="btn btn-remove" tabindex="-1" data-i18n="remove">Remove</button>
					<button type="button" class="btn btn-backup" tabindex="-1" data-i18n="openBackupFolder">Open Backup Folder</button>
				</div>
				<a class="mode-toggler"></a>
			</div>
		</div>
		<script src="./renderer.js"></script>
	</body>
</html>
